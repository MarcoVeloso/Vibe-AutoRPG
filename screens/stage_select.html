<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escolher Fase - Vibe AutoRPG</title>
    <link rel="stylesheet" href="../assets/style.css">
    <script src="../scripts/screen-transition.js"></script>
</head>
<body>
    <div class="game-container">
        <div class="top-panel stage-select-top">
            <a class="footer-btn top-nav left" href="./setup.html">
                <span class="icon emoji">🥷</span>
                <span class="label">HIRO</span>
            </a>

            <div class="hero-gold-display" id="hero-gold-display">$ 0</div>

            <a class="footer-btn top-nav right" href="./shop.html">
                <span class="icon emoji">🏪</span>
                <span class="label">LOJA</span>
            </a>
        </div>

        <div class="stage-display">SELECIONE A FASE</div>

        <div class="stage-list" id="stage-list">
            <!-- Dynamically populated -->
        </div>
    </div>

    <script src="../data/hero.js"></script>
    <script src="../data/stages.js"></script>
    <script>
        const heroGoldDisplay = document.getElementById('hero-gold-display');

        function readNavState() {
            try {
                const data = JSON.parse(window.name || '{}');
                return data && data.vibeAutorpgNav ? data.vibeAutorpgNav : null;
            } catch (e) {
                return null;
            }
        }

        function writeNavState(payload) {
            try {
                window.name = JSON.stringify({ vibeAutorpgNav: payload });
            } catch (e) {
                // ignore
            }
        }

        const navState = readNavState();
        const currentTotalGold = navState && typeof navState.total === 'number' ? navState.total : NaN;

        function readHeroGold() {
            if (!isNaN(currentTotalGold)) return currentTotalGold;
            return Number(HERO_DATA?.gold || 0);
        }

        function updateHeroGoldDisplay() {
            heroGoldDisplay.textContent = `$ ${readHeroGold()}`;
        }

        // Build the stage list from STAGE_DATA
        const list = document.getElementById('stage-list');
        const stages = Object.keys(STAGE_DATA || {});
        if (!stages.length) {
            list.innerHTML = '<div class="no-stage">Nenhuma fase disponível.</div>';
        } else {
            stages.forEach(stageKey => {
                const item = document.createElement('div');
                item.className = 'stage-item';

                const title = document.createElement('div');
                title.className = 'stage-title';
                title.textContent = stageKey;

                const actions = document.createElement('div');
                actions.className = 'stage-actions';

                // Play button (normal)
                const playBtn = document.createElement('button');
                playBtn.className = 'stage-action-btn';
                playBtn.title = 'Jogar';
                playBtn.innerHTML = '▶';
                playBtn.addEventListener('click', () => {
                    writeNavState({ total: readHeroGold() });
                    const url = `./battle.html?stage=${encodeURIComponent(stageKey)}`;
                    if (typeof window.navigateWithTransition === 'function') {
                        window.navigateWithTransition(url);
                        return;
                    }

                    window.location.href = url;
                });

                // Fast-forward button
                const fastBtn = document.createElement('button');
                fastBtn.className = 'stage-action-btn';
                fastBtn.title = 'Jogar (fast)';
                fastBtn.innerHTML = '▶▶';
                fastBtn.addEventListener('click', () => {
                    writeNavState({ total: readHeroGold() });
                    const url = `./battle.html?stage=${encodeURIComponent(stageKey)}&fast=1`;
                    if (typeof window.navigateWithTransition === 'function') {
                        window.navigateWithTransition(url);
                        return;
                    }

                    window.location.href = url;
                });

                actions.appendChild(playBtn);
                actions.appendChild(fastBtn);

                item.appendChild(title);
                item.appendChild(actions);
                list.appendChild(item);
            });
        }

        // --- Animação de gold pós-vitória (window.name) ---
        const victoryStage = navState && typeof navState.stage === 'string' ? navState.stage : null;
        const victoryGold = navState && typeof navState.gold === 'number' ? navState.gold : 0;
        const victoryTotal = !isNaN(currentTotalGold) ? currentTotalGold : readHeroGold();

        if (victoryStage && !isNaN(victoryGold) && victoryGold > 0) {
            const before = victoryTotal - victoryGold;
            heroGoldDisplay.textContent = `$ ${before}`;

            let stageElem = null;
            document.querySelectorAll('.stage-title').forEach(el => {
                if (el.textContent === victoryStage) stageElem = el;
            });

            if (stageElem) {
                setTimeout(() => playGoldVictoryAnimation(victoryGold, stageElem, before), 400);
            } else {
                heroGoldDisplay.textContent = `$ ${victoryTotal}`;
            }
        } else {
            updateHeroGoldDisplay();
        }

        // Limpa o estado transitório após consumir os dados desta navegação.
        writeNavState({ total: readHeroGold() });

        function playGoldVictoryAnimation(amount, fromElem, startCount) {
            const fromRect = fromElem.getBoundingClientRect();
            const goldRect = heroGoldDisplay.getBoundingClientRect();
            const startX = fromRect.left + fromRect.width  / 2;
            const startY = fromRect.top  + fromRect.height / 2;
            const dx = (goldRect.left + goldRect.width  / 2) - startX;
            const dy = (goldRect.top  + goldRect.height / 2) - startY;
            const staggerStep = amount > 1 ? 300 / (amount - 1) : 0;

            let count = startCount;

            for (let i = 0; i < amount; i++) {
                const el = document.createElement('span');
                el.textContent = '$';
                const ox = (Math.random() - 0.5) * 20;
                const oy = (Math.random() - 0.5) * 20;
                el.style.cssText = [
                    'position:fixed',
                    `left:${startX + ox}px`,
                    `top:${startY + oy}px`,
                    'z-index:99999',
                    'pointer-events:none',
                    'font-size:12px',
                    'font-weight:700',
                    'line-height:1',
                    'color:#ffd84d',
                    'text-shadow:0 0 6px #ffb700,0 0 14px #ff8c00',
                    'transform:translate(-50%,-50%)',
                ].join(';');
                document.body.appendChild(el);

                const jx = (Math.random() - 0.5) * 20;
                const jy = (Math.random() - 0.5) * 20;

                const anim = el.animate([
                    { transform: 'translate(-50%,-50%) scale(1)', opacity: 0.8 },
                    { transform: `translate(calc(-50% + ${dx + jx}px), calc(-50% + ${dy + jy}px)) scale(1.3)`, opacity: 0 }
                ], {
                    duration: 700,
                    delay: i * staggerStep,
                    easing: 'cubic-bezier(0.25,0.46,0.45,0.94)',
                    fill: 'forwards'
                });
                anim.onfinish = () => {
                    el.remove();
                    count++;
                    heroGoldDisplay.textContent = `$ ${count}`;
                };
            }
        }
    </script>
    
</body>
</html>
