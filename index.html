<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibe AutoRPG - Batalha em Turnos</title>
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>
    <div class="game-container">
        <!-- Topo: Controles e Ouro -->
        <div class="top-panel">
            <button id="restart-btn" class="restart-btn">↺</button>
            <div class="gold-display">$ 3400</div>
        </div>

        <!-- Inimigo -->
        <div class="enemy-section">
            <div class="enemy-hp-bar">
                <div class="hp-label" id="enemy-name-label">INIMIGO 1/1</div>
                <div class="hp-container">
                    <div class="hp-fill enemy-hp" style="width: 100%"></div>
                    <div class="hp-text"><span id="enemy-hp">5</span>/<span id="enemy-max-hp">5</span></div>
                </div>
            </div>
            <div class="enemy-visual">
                <div class="enemy-sprite">🧟</div>
            </div>
        </div>

        <!-- Meio: Herói e Barras -->
        <div class="hero-section">
            <div class="hero-visual">
                <div class="hero-sprite">🥷</div>
            </div>
            
            <div class="stats-container">
                <div class="stat-bar hp-bar">
                    <div class="bar-container">
                        <div class="bar-fill hero-hp" style="width: 100%"></div>
                        <div class="bar-text"><span id="hero-hp">10</span>/<span id="hero-max-hp">10</span></div>
                    </div>
                </div>

                <div class="stat-bar ap-bar">
                    <div class="bar-container">
                        <div class="bar-fill hero-ap" style="width: 100%"></div>
                        <div class="bar-text"><span id="hero-ap">5</span>/<span id="hero-max-ap">5</span></div>
                    </div>
                </div>

                <div class="hero-info-row">
                    <span class="hero-info-left" id="hero-pf">PF: 2</span>
                    <span class="hero-info-center" id="hero-pd">PD: 0</span>
                    <span class="hero-info-right">PRIMEIRO ATAQUE</span>
                </div>
            </div>
        </div>

        <!-- Log de Ações -->
        <div class="action-log">
            <div id="log-content" class="log-text">--- INÍCIO ---</div>
        </div>

        <!-- Botões de Ação (2x3) -->
        <div class="actions-grid">
            <button class="action-btn" data-action="1" data-effect="-1">
                <div class="btn-title">Ataque Normal</div>
                <div class="btn-meta-row">
                    <div class="btn-cost">0 PA</div>
                    <div class="btn-effect negative">-1 PV</div>
                </div>
            </button>
            <button class="action-btn" data-action="2" data-effect="-2">
                <div class="btn-title">Ataque Forte</div>
                <div class="btn-meta-row">
                    <div class="btn-cost">-1 PA</div>
                    <div class="btn-effect negative">-2 PV</div>
                </div>
            </button>
            <button class="action-btn" data-action="3" data-effect="-3">
                <div class="btn-title">Golpe Pesado</div>
                <div class="btn-meta-row">
                    <div class="btn-cost">-2 PA</div>
                    <div class="btn-effect negative">-3 PV</div>
                </div>
            </button>
            <button class="action-btn" data-action="4" data-effect="-4">
                <div class="btn-title">Golpe Final</div>
                <div class="btn-meta-row">
                    <div class="btn-cost">-3 PA</div>
                    <div class="btn-effect negative">-4 PV</div>
                </div>
            </button>
            <button class="action-btn" data-action="5" data-effect="2">
                <div class="btn-title">Cura</div>
                <div class="btn-meta-row">
                    <div class="btn-cost">-1 PA</div>
                    <div class="btn-effect positive">+2 PV</div>
                </div>
            </button>
            <button class="action-btn" data-action="6" data-effect="0">
                <div class="btn-title">Concentração</div>
                <div class="btn-meta-row">
                    <div class="btn-cost">+1 PA</div>
                    <div class="btn-effect neutral">0 PV</div>
                </div>
            </button>
        </div>
    </div>

    <script src="data/hero.js"></script>
    <script src="data/skills.js"></script>
    <script src="data/enemies.js"></script>
    <script src="data/stages.js"></script>
    <script src="scripts/battle.js"></script>
</body>
</html>
